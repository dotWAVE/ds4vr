; ds4vr.ini — runtime configuration
; Edit this file and restart SteamVR to apply changes.
;
; Button targets: x, y, a, b, grip, system, unbound
; Vec3 format:    x,y,z (no spaces)

[sticks]
deadzone       = 0.08
response_curve = 1.0

[trigger]
click_threshold = 0.85

[imu]
beta        = 0.04

[engage]
t_dtap_ms   = 250

[armmodel]
forearm_nominal       = 0.26
elbow_lift_max        = 0.12
pitch_lo_deg          = -20
pitch_hi_deg          = 70
shoulder_offset_left  = -0.18,-0.24,-0.05
shoulder_offset_right =  0.18,-0.24,-0.05
pose_blend_ms         = 100
hmd_pitch_influence   = 0.35

[reach]
mode                  = rate
rate_mps              = 0.6
deadzone              = 0.12
d_min                 = 0.20
d_max                 = 0.70
rest                  = 0.90
outward_deg           = 30
default               = 0.45
invert                = false

[mapping]
grip_toggle = true

[mapping.left]
; DS4 D-pad buttons → Touch left-hand components
dpad_up    = y
dpad_left  = x
dpad_down  = unbound
dpad_right = grip

[mapping.right]
; DS4 face buttons → Touch right-hand components
cross    = a
circle   = b
square   = grip
triangle = unbound

[haptics]
left_motor  = large
right_motor = small
